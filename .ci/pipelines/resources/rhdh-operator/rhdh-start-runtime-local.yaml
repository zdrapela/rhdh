kind: Backstage
apiVersion: rhdh.redhat.com/v1alpha5
metadata:
  name: rhdh
spec:
  deployment:
    patch:
      spec:
        template:
          spec:
            containers:
              - name: backstage-backend
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
            initContainers:
              - name: install-dynamic-plugins
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
            volumes:
              - name: dynamic-plugins-root
                ephemeral:
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 5Gi
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh
      mountPath: /opt/app-root/src
    dynamicPluginsConfigMapName: dynamic-plugins
    extraFiles:
      mountPath: /opt/app-root/src
      secrets:
        - name: postgres-crt
          key: postgres-crt.pem
    extraEnvs:
      envs:
        - name: NODE_OPTIONS
          value: "--no-node-snapshot"
        - name: NODE_ENV
          value: "production"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: CATALOG_INDEX_IMAGE
          value: "quay.io/rhdh/plugin-catalog-index:1.10"
          containers:
            - install-dynamic-plugins
      secrets:
        - name: rhdh-runtime-config
    route:
      enabled: true
  # Disable all default flavours (e.g. lightspeed) to avoid unnecessary sidecar
  # containers and init containers that slow down startup and restarts.
  # Runtime tests don't need lightspeed — they only test ConfigMap changes and DB connectivity.
  flavours: []
